apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: pedidos-hpa
  namespace: pedidos-veloz

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pedidos-service

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70