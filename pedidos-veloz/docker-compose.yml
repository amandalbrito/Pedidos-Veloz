version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pedidosdb

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  pedidos-service:
    build: ./pedidos-service
    ports:
      - "8081:8080"

    depends_on:
      - mysql

  pagamentos-service:
    build: ./pagamentos-service
    ports:
      - "8082:8080"

  estoque-service:
    build: ./estoque-service
    ports:
      - "8083:8080"

    depends_on:
      - mysql

  gateway:
    build: ./gateway
    ports:
      - "80:80"

    depends_on:
      - pedidos-service
      - pagamentos-service
      - estoque-service

volumes:
  mysql_data: